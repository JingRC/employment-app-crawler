name: market-expansion-cloud

on:
  workflow_dispatch:
    inputs:
      run_priority_wave:
        description: Run the first market expansion wave.
        required: false
        type: boolean
        default: true
      priority_max_batches:
        description: Optional cap for the first wave. Use 0 to run all batches.
        required: false
        default: '0'
      priority_phases:
        description: Comma-separated first-wave phase keys. Defaults to a CI-safe API phase.
        required: false
        default: 'guopin-public'
      run_followup_wave:
        description: Run the follow-up official and vertical-source expansion wave.
        required: false
        type: boolean
        default: false
      followup_max_batches:
        description: Optional cap for the second wave. Use 0 to run all batches.
        required: false
        default: '0'
      continue_on_error:
        description: Continue later batches after a failed expansion batch.
        required: false
        type: boolean
        default: true
      dry_run:
        description: Only generate market-expansion plans without executing them.
        required: false
        type: boolean
        default: false
      run_high_inactive_repair:
        description: After expansion, run high inactive source repair.
        required: false
        type: boolean
        default: false
      high_inactive_sources:
        description: Optional comma-separated high inactive sources. Leave empty to auto-select.
        required: false
        default: ''
      high_inactive_auto_select_count:
        description: Auto-select count when high inactive sources is empty.
        required: false
        default: '2'
      retry_once_on_failure:
        description: Retry each expansion command once if the first attempt fails.
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: cloud-maintenance-db-write
  cancel-in-progress: false

jobs:
  expansion:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            就业App原型/backend_api/requirements.txt

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r 就业App原型/backend_api/requirements.txt

      - name: Initialize database
        working-directory: 就业App原型/backend_api
        run: python init_db.py

      - name: Create ASCII backend API alias
        run: |
          rm -rf /tmp/backend_api
          ln -s "$GITHUB_WORKSPACE/就业App原型/backend_api" /tmp/backend_api

      - name: Start backend API for market expansion
        if: ${{ inputs.run_priority_wave || inputs.run_followup_wave }}
        working-directory: 就业App原型/backend_api
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > data/market_expansion_cloud_server.log 2>&1 &
          echo $! > data/market_expansion_cloud_server.pid

      - name: Wait for backend API
        if: ${{ inputs.run_priority_wave || inputs.run_followup_wave }}
        working-directory: 就业App原型/backend_api
        run: |
          python - <<'PY'
          import sys
          import time
          import urllib.request

          url = 'http://127.0.0.1:8000/api/crawler/status'
          last_error = ''
          for _ in range(60):
              try:
                  with urllib.request.urlopen(url, timeout=5) as response:
                      if response.status == 200:
                          print('backend ready')
                          raise SystemExit(0)
              except Exception as exc:
                  last_error = str(exc)
                  time.sleep(2)
          raise SystemExit(f'backend not ready: {last_error}')
          PY

      - name: Start headless Chrome for browser phases
        if: ${{ inputs.run_priority_wave || inputs.run_followup_wave }}
        run: |
          "${{ steps.chrome.outputs.chrome-path }}" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --remote-debugging-address=127.0.0.1 \
            --remote-debugging-port=9222 \
            --user-data-dir=/tmp/market-expansion-chrome \
            about:blank >/tmp/market-expansion-chrome.log 2>&1 &
          echo $! >/tmp/market-expansion-chrome.pid

      - name: Run priority market expansion
        if: ${{ inputs.run_priority_wave }}
        working-directory: 就业App原型/backend_api
        env:
          PRIORITY_MAX_BATCHES: ${{ inputs.priority_max_batches }}
          PRIORITY_PHASES: ${{ inputs.priority_phases }}
          CONTINUE_ON_ERROR: ${{ inputs.continue_on_error }}
          DRY_RUN: ${{ inputs.dry_run }}
          RETRY_ONCE_ON_FAILURE: ${{ inputs.retry_once_on_failure }}
          HEADLESS_BROWSER: '1'
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          args=(--base-url http://127.0.0.1:8000)
          if [ -n "$PRIORITY_PHASES" ]; then
            args+=(--phases "$PRIORITY_PHASES")
          fi
          if [ -n "$PRIORITY_MAX_BATCHES" ] && [ "$PRIORITY_MAX_BATCHES" != "0" ]; then
            args+=(--max-batches "$PRIORITY_MAX_BATCHES")
          fi
          if [ "$CONTINUE_ON_ERROR" = "true" ]; then
            args+=(--continue-on-error)
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          if python run_priority_market_expansion.py "${args[@]}"; then
            exit 0
          fi
          if [ "$DRY_RUN" = "true" ] || [ "$RETRY_ONCE_ON_FAILURE" != "true" ]; then
            exit 1
          fi
          python run_priority_market_expansion.py "${args[@]}"

      - name: Run follow-up market expansion
        if: ${{ inputs.run_followup_wave }}
        working-directory: 就业App原型/backend_api
        env:
          FOLLOWUP_MAX_BATCHES: ${{ inputs.followup_max_batches }}
          CONTINUE_ON_ERROR: ${{ inputs.continue_on_error }}
          DRY_RUN: ${{ inputs.dry_run }}
          RETRY_ONCE_ON_FAILURE: ${{ inputs.retry_once_on_failure }}
          HEADLESS_BROWSER: '1'
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          args=(--base-url http://127.0.0.1:8000)
          if [ -n "$FOLLOWUP_MAX_BATCHES" ] && [ "$FOLLOWUP_MAX_BATCHES" != "0" ]; then
            args+=(--max-batches "$FOLLOWUP_MAX_BATCHES")
          fi
          if [ "$CONTINUE_ON_ERROR" = "true" ]; then
            args+=(--continue-on-error)
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          if python run_followup_market_expansion.py "${args[@]}"; then
            exit 0
          fi
          if [ "$DRY_RUN" = "true" ] || [ "$RETRY_ONCE_ON_FAILURE" != "true" ]; then
            exit 1
          fi
          python run_followup_market_expansion.py "${args[@]}"

      - name: Run high inactive source repair after expansion
        if: ${{ inputs.run_high_inactive_repair }}
        working-directory: /tmp/backend_api
        env:
          HIGH_INACTIVE_SOURCES: ${{ inputs.high_inactive_sources }}
          HIGH_INACTIVE_AUTO_SELECT_COUNT: ${{ inputs.high_inactive_auto_select_count }}
          DRY_RUN: ${{ inputs.dry_run }}
          HEADLESS_BROWSER: '1'
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          args=()
          if [ -n "$HIGH_INACTIVE_SOURCES" ]; then
            args+=(--sources "$HIGH_INACTIVE_SOURCES")
          fi
          if [ -n "$HIGH_INACTIVE_AUTO_SELECT_COUNT" ]; then
            args+=(--auto-select-count "$HIGH_INACTIVE_AUTO_SELECT_COUNT")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--validate-startup)
          fi
          xvfb-run -a python run_high_inactive_source_repair.py "${args[@]}"

      - name: Publish combined maintenance summary
        if: always()
        working-directory: 就业App原型/backend_api
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def load_summary(path_str):
              path = Path(path_str)
              if not path.exists():
                  return None
              try:
                  return json.loads(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  return {'load_error': str(exc), 'results': [], 'finished_at': ''}

          stages = [
              ('priority_market_expansion_last_result.json', '第一波主平台扩量'),
              ('followup_market_expansion_last_result.json', '第二波官方与垂直源扩量'),
              ('high_inactive_source_repair_last_result.json', '高下架来源专项修复'),
          ]
          lines = [
              '# Market Expansion Cloud Summary',
              '',
              '这条 workflow 会按顺序执行云端扩量，并可选串上高下架来源专项复核。',
              '',
          ]
          for filename, label in stages:
              data = load_summary(f'data/{filename}')
              if not data:
                  lines.extend([f'## {label}', '', '- status: missing', ''])
                  continue
              lines.extend([
                  f'## {label}',
                  '',
                  f"- finished_at: {data.get('finished_at') or '-'}",
                  f"- total_fetched: {int(data.get('total_fetched') or 0)}",
                  f"- total_new: {int(data.get('total_new') or 0)}",
                  f"- total_updated: {int(data.get('total_updated') or 0)}",
                  f"- completed: {int(data.get('completed') or 0)}",
                  f"- failed: {int(data.get('failed') or 0)}",
                  '',
              ])
          text = '\n'.join(lines)
          print(text)
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if summary_file:
              Path(summary_file).write_text(text + '\n', encoding='utf-8')
          PY

      - name: Stop backend API
        if: always() && (inputs.run_priority_wave || inputs.run_followup_wave)
        working-directory: 就业App原型/backend_api
        run: |
          if [ -f data/market_expansion_cloud_server.pid ]; then
            kill $(cat data/market_expansion_cloud_server.pid) || true
          fi
          if [ -f /tmp/market-expansion-chrome.pid ]; then
            kill $(cat /tmp/market-expansion-chrome.pid) || true
          fi

      - name: Commit updated database and maintenance summaries
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          paths=(
            "就业App原型/backend_api/data/jobs.db"
            "就业App原型/backend_api/data/cache"
            "就业App原型/backend_api/data/priority_market_expansion_last_result.json"
            "就业App原型/backend_api/data/priority_market_expansion_checkpoint.json"
            "就业App原型/backend_api/data/followup_market_expansion_last_result.json"
            "就业App原型/backend_api/data/followup_market_expansion_checkpoint.json"
            "就业App原型/backend_api/data/high_inactive_source_repair_last_result.json"
          )
          for path in "${paths[@]}"; do
            if [ -e "$path" ]; then
              git add "$path"
            fi
          done
          if git diff --cached --quiet; then
            echo "No market expansion maintenance changes to commit"
            exit 0
          fi
          git commit -m "chore: update market expansion cloud maintenance data"
          if git push; then
            exit 0
          fi
          echo "Initial push failed; rebasing onto latest origin/main and retrying once"
          git fetch origin main
          git rebase origin/main
          git push
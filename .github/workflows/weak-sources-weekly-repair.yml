name: weak-sources-weekly-repair

on:
  workflow_dispatch:
    inputs:
      sources:
        description: Comma-separated weak source codes. Use none to skip all sources.
        required: false
        default: qdhr,qingdao_rc,rcsd_talents,sdgxbys
      validate_startup:
        description: Only validate startup, summary writing, and analytics warmup.
        required: false
        type: boolean
        default: false
      retry_once_on_failure:
        description: Retry the weekly repair command once if the first attempt fails.
        required: false
        type: boolean
        default: true
  schedule:
    - cron: '10 3 * * 0'

permissions:
  contents: write

concurrency:
  group: weak-sources-weekly-repair
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            就业App原型/backend_api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r 就业App原型/backend_api/requirements.txt

      - name: Initialize database
        working-directory: 就业App原型/backend_api
        run: python init_db.py

      - name: Run weak source weekly repair
        working-directory: 就业App原型/backend_api
        env:
          WEEKLY_REPAIR_SOURCES: ${{ github.event_name == 'workflow_dispatch' && inputs.sources || 'qdhr,qingdao_rc,rcsd_talents,sdgxbys' }}
          VALIDATE_STARTUP: ${{ github.event_name == 'workflow_dispatch' && inputs.validate_startup || 'false' }}
          RETRY_ONCE_ON_FAILURE: ${{ github.event_name == 'workflow_dispatch' && inputs.retry_once_on_failure || 'true' }}
        run: |
          args=()
          if [ -n "$WEEKLY_REPAIR_SOURCES" ]; then
            args+=(--sources "$WEEKLY_REPAIR_SOURCES")
          fi
          if [ "$VALIDATE_STARTUP" = "true" ]; then
            args+=(--validate-startup)
          fi
          if python run_weak_source_weekly_repair.py "${args[@]}"; then
            exit 0
          fi
          if [ "$VALIDATE_STARTUP" = "true" ] || [ "$RETRY_ONCE_ON_FAILURE" != "true" ]; then
            exit 1
          fi
          python run_weak_source_weekly_repair.py "${args[@]}"

      - name: Publish weekly repair summary
        if: always()
        working-directory: 就业App原型/backend_api
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path('data/weak_source_weekly_repair_last_result.json')
          if not summary_path.exists():
              print('weak_source_weekly_repair_last_result.json not found; skip summary publish')
              raise SystemExit(0)

          data = json.loads(summary_path.read_text(encoding='utf-8'))
          results = list(data.get('results') or [])
          analytics_warmup = dict(data.get('analytics_warmup') or {})
          lines = [
              '# Weak Source Weekly Repair Summary',
              '',
              f"- overall_status: {data.get('overall_status') or '-'}",
              f"- validate_startup: {'true' if data.get('validate_startup') else 'false'}",
              f"- selected_sources: {', '.join(data.get('selected_sources') or []) or 'none'}",
              f"- finished_at: {data.get('finished_at') or '-'}",
              f"- total_fetched: {int(data.get('total_fetched') or 0)}",
              f"- total_new: {int(data.get('total_new') or 0)}",
              f"- total_updated: {int(data.get('total_updated') or 0)}",
              f"- analytics_warmup_success: {int(analytics_warmup.get('success_count') or 0)}",
              f"- analytics_warmup_failed: {int(analytics_warmup.get('failed_count') or 0)}",
              '',
              '| source | status | fetched | new | updated | note |',
              '| --- | --- | ---: | ---: | ---: | --- |',
          ]
          if not results:
              lines.append('| - | skipped | 0 | 0 | 0 | 启动验证或未选择来源 |')
          for item in results:
              lines.append(
                  f"| {item.get('source_code') or '-'} | {item.get('status') or '-'} | {int(item.get('total_fetched') or 0)} | {int(item.get('new_to_db') or 0)} | {int(item.get('updated_in_db') or 0)} | {str(item.get('error') or item.get('note') or '').replace('|', '/')} |"
              )
          text = '\n'.join(lines)
          print(text)
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if summary_file:
              Path(summary_file).write_text(text + '\n', encoding='utf-8')
          PY

      - name: Commit updated database and weekly repair summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            就业App原型/backend_api/data/jobs.db \
            就业App原型/backend_api/data/weak_source_weekly_repair_last_result.json
          if [ -d "就业App原型/backend_api/data/cache" ]; then
            git add 就业App原型/backend_api/data/cache
          fi
          if git diff --cached --quiet; then
            echo "No weekly repair changes to commit"
            exit 0
          fi
          git commit -m "chore: update weak source weekly repair data"
          git push
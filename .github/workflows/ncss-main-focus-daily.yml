name: ncss-main-focus-daily

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: Focused expansion strategy. Use custom when passing explicit sources or cities.
        required: false
        default: coverage_first
      sources:
        description: Optional focused NCSS main source keys.
        required: false
        default: ''
      city_preset:
        description: City preset for custom direct mode.
        required: false
        default: all_cities
      validate_startup:
        description: Only validate startup, database initialization, and summary writing.
        required: false
        type: boolean
        default: false
      retry_once_on_failure:
        description: Retry the focused sync command once if the first attempt fails.
        required: false
        type: boolean
        default: true
  schedule:
    - cron: '20 0,8,16 * * *'

permissions:
  contents: write

concurrency:
  group: cloud-maintenance-db-write
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            就业App原型/backend_api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r 就业App原型/backend_api/requirements.txt

      - name: Initialize database
        working-directory: 就业App原型/backend_api
        run: python init_db.py

      - name: Create ASCII backend API alias
        run: |
          rm -rf /tmp/backend_api
          ln -s "$GITHUB_WORKSPACE/就业App原型/backend_api" /tmp/backend_api

      - name: Run focused NCSS main daily sync
        working-directory: /tmp/backend_api
        env:
          FOCUS_STRATEGY: ${{ github.event_name == 'workflow_dispatch' && inputs.strategy || 'coverage_first' }}
          FOCUS_SOURCES: ${{ github.event_name == 'workflow_dispatch' && inputs.sources || '' }}
          CITY_PRESET: ${{ github.event_name == 'workflow_dispatch' && inputs.city_preset || 'all_cities' }}
          VALIDATE_STARTUP: ${{ github.event_name == 'workflow_dispatch' && inputs.validate_startup || 'false' }}
          RETRY_ONCE_ON_FAILURE: ${{ github.event_name == 'workflow_dispatch' && inputs.retry_once_on_failure || 'true' }}
        run: |
          args=()
          if [ -n "$FOCUS_STRATEGY" ]; then
            args+=(--strategy "$FOCUS_STRATEGY")
          fi
          if [ -n "$FOCUS_SOURCES" ]; then
            args+=(--sources "$FOCUS_SOURCES")
          fi
          if [ -n "$CITY_PRESET" ]; then
            args+=(--city-preset "$CITY_PRESET")
          fi
          if [ "$VALIDATE_STARTUP" = "true" ]; then
            args+=(--validate-startup)
          fi
          if python run_ncss_main_focus_daily_sync.py "${args[@]}"; then
            exit 0
          fi
          if [ "$VALIDATE_STARTUP" = "true" ] || [ "$RETRY_ONCE_ON_FAILURE" != "true" ]; then
            exit 1
          fi
          python run_ncss_main_focus_daily_sync.py "${args[@]}"

      - name: Publish focused sync summary
        if: always()
        working-directory: 就业App原型/backend_api
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path('data/ncss_main_focus_daily_last_result.json')
          if not summary_path.exists():
              print('ncss_main_focus_daily_last_result.json not found; skip summary publish')
              raise SystemExit(0)

          data = json.loads(summary_path.read_text(encoding='utf-8'))
          results = list(data.get('results') or [])
          failed_items = [item for item in results if str(item.get('status') or '').lower() == 'failed']
          lines = [
              '# NCSS Main Focus Daily Summary',
              '',
              f"- finished_at: {data.get('finished_at') or '-'}",
              f"- strategy_name: {data.get('strategy_name') or '-'}",
              f"- source_catalog_mode: {data.get('source_catalog_mode') or '-'}",
              f"- city_preset: {data.get('city_preset') or '-'}",
              f"- split_by_city: {bool(data.get('split_by_city'))}",
              f"- selected_sources: {', '.join(data.get('selected_sources') or []) or 'none'}",
              f"- dropped_sources: {', '.join((data.get('dynamic_whitelist') or {}).get('dropped_source_keys') or []) or 'none'}",
              f"- plan_count: {int(data.get('plan_count') or 0)}",
              f"- total_fetched: {int(data.get('total_fetched') or 0)}",
              f"- total_new: {int(data.get('total_new') or 0)}",
              f"- total_updated: {int(data.get('total_updated') or 0)}",
              f"- failed_count: {len(failed_items)}",
              '',
          ]
          if failed_items:
              lines.extend([
                  '## Failed Items',
                  '',
                  '| source | cities | error |',
                  '| --- | --- | --- |',
              ])
              for item in failed_items[:50]:
                  lines.append(
                      f"| {item.get('source_label') or item.get('source_key') or '-'} | {', '.join(item.get('cities') or []) or '-'} | {item.get('error') or '-'} |"
                  )
              lines.append('')
          text = '\n'.join(lines)
          print(text)
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if summary_file:
              Path(summary_file).write_text(text + '\n', encoding='utf-8')
          PY

      - name: Commit updated database and summaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            就业App原型/backend_api/data/jobs.db \
            就业App原型/backend_api/data/cache \
            就业App原型/backend_api/data/ncss_main_focus_daily_last_result.json \
            就业App原型/backend_api/data/ncss_main_focus_daily_source_health.json
          if git diff --cached --quiet; then
            echo "No focused NCSS main changes to commit"
            exit 0
          fi
          git commit -m "chore: update ncss main focus daily data"
          git push
